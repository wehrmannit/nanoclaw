services:
  memos-api:
    build:
      context: ./MemOS
      dockerfile: docker/Dockerfile
    container_name: memos-api
    restart: unless-stopped
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=memos_secure_2026
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_API_BASE=http://ollama:11434
      - ASYNC_MODE=sync
      - MOS_ENABLE_SCHEDULER=false
      - MOS_CUBE_PATH=/data/cubes
    volumes:
      - memos_data:/data
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - memos_net
    deploy:
      resources:
        limits:
          memory: 2G

  neo4j:
    image: neo4j:5.26.4
    container_name: memos-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/memos_secure_2026
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=128m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - memos_net
    deploy:
      resources:
        limits:
          memory: 1G

  qdrant:
    image: qdrant/qdrant:v1.15.3
    container_name: memos-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - memos_net
    deploy:
      resources:
        limits:
          memory: 512M

  ollama:
    image: ollama/ollama:latest
    container_name: memos-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - memos_net
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  memos_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  ollama_data:

networks:
  memos_net:
    driver: bridge
